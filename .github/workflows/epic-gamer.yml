name: Epic Awesome Gamer (Scheduled)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 08:00 (北京时间 16:00) 运行一次
    - cron: '0 8 * * *'

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # 🔴 [核心修改] 只有当仓库不是 '10000ge10000/epic-awesome-gamer' 时才运行
    # 效果：你的仓库触发定时任务会直接显示 Skipped (灰色)，别人 Fork 后会正常运行 (绿色)
    if: github.repository != '10000ge10000/epic-awesome-gamer'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev

      - name: Install dependencies
        run: uv sync

      # 增加 GITHUB_TOKEN 以解决 Camoufox 下载时的 403 频率限制
      - name: Install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL || 'https://generativelanguage.googleapis.com' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash'}}
          CHALLENGE_CLASSIFIER_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash'}}
          IMAGE_CLASSIFIER_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash'}}
          SPATIAL_POINT_REASONER_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash'}}
          SPATIAL_PATH_REASONER_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash'}}
          # 在 Actions 中我们依靠 GitHub 的 cron 触发，所以关闭内部调度器
          ENABLE_APSCHEDULER: false
          PYTHONPATH: app
        run: |
          echo "🚀 启动定时领取任务..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py
